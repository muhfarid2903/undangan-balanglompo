<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="380" height="280">
  <defs>
    <!-- lobus daun kipas -->
    <ellipse id="lobe" cx="0" cy="-46" rx="13" ry="46"/>
    <g id="fan">
      <use href="#lobe" transform="rotate(-64)"/>
      <use href="#lobe" transform="rotate(-32)"/>
      <use href="#lobe" transform="rotate(0)"/>
      <use href="#lobe" transform="rotate(32)"/>
      <use href="#lobe" transform="rotate(64)"/>
    </g>
    <!-- helai palem: pelepah + daun kecil rapat dua sisi -->
    <ellipse id="lf" cx="0" cy="-15" rx="3.4" ry="15"/>
    <g id="palm">
      <path d="M0 0 Q 44 -34 104 -42" fill="none" stroke-width="2.4"/>
      <use href="#lf" transform="translate(18 -12) rotate(-38)"/>
      <use href="#lf" transform="translate(34 -20) rotate(-34)"/>
      <use href="#lf" transform="translate(52 -27) rotate(-30)"/>
      <use href="#lf" transform="translate(70 -33) rotate(-26)"/>
      <use href="#lf" transform="translate(88 -38) rotate(-22)"/>
      <use href="#lf" transform="translate(22 -8) rotate(135) scale(0.9)"/>
      <use href="#lf" transform="translate(40 -16) rotate(139) scale(0.9)"/>
      <use href="#lf" transform="translate(58 -23) rotate(143) scale(0.9)"/>
      <use href="#lf" transform="translate(76 -29) rotate(147) scale(0.9)"/>
      <use href="#lf" transform="translate(94 -34) rotate(151) scale(0.85)"/>
    </g>
  </defs>

  <!-- daun kipas besar di pojok -->
  <g transform="translate(64 252)">
    <use href="#fan" fill="#41705a" opacity="0.85"/>
    <path d="M0 0 L0 -88" stroke="#2e523c" stroke-width="2" opacity="0.7"/>
  </g>
  <path d="M64 280 L64 248" stroke="#2e523c" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- daun kipas kedua, lebih muda & kecil -->
  <g transform="translate(150 268) rotate(18) scale(0.66)">
    <use href="#fan" fill="#6f9d80" opacity="0.75"/>
  </g>
  <path d="M150 280 L150 264" stroke="#3f6b4f" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>

  <!-- pelepah palem -->
  <g transform="translate(96 276)" stroke="#5d8a6a" fill="#5d8a6a" opacity="0.72">
    <use href="#palm"/>
  </g>
  <g transform="translate(176 280) rotate(-14) scale(0.78)" stroke="#8fb89d" fill="#8fb89d" opacity="0.65">
    <use href="#palm"/>
  </g>

  <!-- bunga kamboja aksen -->
  <g fill="#f0d6a8" opacity="0.92">
    <ellipse cx="118" cy="206" rx="7" ry="12" transform="rotate(-20 118 206)"/>
    <ellipse cx="130" cy="212" rx="7" ry="12" transform="rotate(28 130 212)"/>
    <ellipse cx="124" cy="222" rx="7" ry="11" transform="rotate(4 124 222)"/>
  </g>
  <circle cx="124" cy="213" r="5" fill="#c6ad77"/>

  <!-- serbuk emas -->
  <g stroke="#c6ad77" stroke-width="1.3" fill="#c6ad77" opacity="0.85">
    <path d="M232 256 q 18 -26 8 -54" fill="none"/>
    <circle cx="240" cy="202" r="2.6"/><circle cx="244" cy="226" r="2.2"/><circle cx="238" cy="244" r="2"/>
    <circle cx="184" cy="196" r="2.2"/><circle cx="36" cy="172" r="2"/>
  </g>
</svg>
