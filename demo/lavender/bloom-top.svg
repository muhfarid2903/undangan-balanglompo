<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="380" height="280">
  <defs>
    <ellipse id="skpt" cx="0" cy="-18" rx="10" ry="17"/>
    <g id="sakura5t">
      <use href="#skpt" transform="rotate(0)"/><use href="#skpt" transform="rotate(72)"/>
      <use href="#skpt" transform="rotate(144)"/><use href="#skpt" transform="rotate(216)"/>
      <use href="#skpt" transform="rotate(288)"/>
    </g>
    <g id="budt"><ellipse cx="0" cy="0" rx="5" ry="7.5"/></g>
  </defs>

  <!-- ranting menggantung dari atas -->
  <g fill="none" stroke="#7d5a48" stroke-linecap="round">
    <path d="M10 0 Q 44 64 104 92 Q 158 116 212 108" stroke-width="4.6"/>
    <path d="M70 58 Q 102 70 126 60" stroke-width="2.8"/>
    <path d="M104 92 Q 132 80 164 84" stroke-width="2.6"/>
    <path d="M168 112 Q 190 124 214 120" stroke-width="2.2"/>
  </g>

  <!-- bunga -->
  <use href="#sakura5t" transform="translate(104 92) rotate(10)" fill="#f3c6d0" fill-opacity="0.85"/>
  <circle cx="104" cy="92" r="6.8" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#sakura5t" transform="translate(164 86) scale(0.78) rotate(-22)" fill="#eeb1c0" fill-opacity="0.82"/>
  <circle cx="164" cy="86" r="5.8" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#sakura5t" transform="translate(126 58) scale(0.66) rotate(32)" fill="#f7dde4" fill-opacity="0.85"/>
  <circle cx="126" cy="58" r="5" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#sakura5t" transform="translate(212 110) scale(0.6) rotate(48)" fill="#f3c6d0" fill-opacity="0.78"/>
  <circle cx="212" cy="110" r="4.6" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#sakura5t" transform="translate(56 42) scale(0.52)" fill="#eeb1c0" fill-opacity="0.75"/>

  <!-- kuncup -->
  <g fill="#d98ba0" opacity="0.82">
