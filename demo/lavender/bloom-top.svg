    <use href="#budt" transform="translate(146 122) rotate(150) scale(0.75)"/>
  </g>

  <!-- kelopak melayang & serbuk emas -->
  <g fill="#f3c6d0" opacity="0.7">
    <ellipse cx="246" cy="148" rx="5.6" ry="3.1" transform="rotate(-30 246 148)"/>
    <ellipse cx="206" cy="170" rx="5" ry="2.8" transform="rotate(22 206 170)"/>
    <ellipse cx="258" cy="60" rx="5" ry="2.8" transform="rotate(-12 258 60)"/>
  </g>
  <g fill="#c6ad77" opacity="0.78">
    <circle cx="226" cy="64" r="2.2"/><circle cx="186" cy="138" r="2"/>
    <circle cx="240" cy="128" r="1.8"/>
