<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="380" height="280">
  <defs>
    <ellipse id="skp" cx="0" cy="-18" rx="10" ry="17"/>
    <g id="sakura5">
      <use href="#skp" transform="rotate(0)"/><use href="#skp" transform="rotate(72)"/>
      <use href="#skp" transform="rotate(144)"/><use href="#skp" transform="rotate(216)"/>
      <use href="#skp" transform="rotate(288)"/>
    </g>
    <g id="bud"><ellipse cx="0" cy="0" rx="5.5" ry="8"/></g>
  </defs>

  <!-- ranting cokelat -->
  <g fill="none" stroke="#7d5a48" stroke-linecap="round">
    <path d="M14 280 Q 40 200 96 168 Q 150 138 208 142" stroke-width="5"/>
    <path d="M60 226 Q 96 218 124 230" stroke-width="3"/>
    <path d="M96 168 Q 120 186 158 192" stroke-width="3"/>
    <path d="M150 146 Q 168 162 196 168" stroke-width="2.4"/>
    <path d="M40 254 Q 64 252 84 262" stroke-width="2.6"/>
  </g>

  <!-- bunga sakura -->
  <use href="#sakura5" transform="translate(96 168)" fill="#f3c6d0" fill-opacity="0.88"/>
  <circle cx="96" cy="168" r="7.5" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#sakura5" transform="translate(160 192) scale(0.86) rotate(24)" fill="#eeb1c0" fill-opacity="0.85"/>
  <circle cx="160" cy="192" r="6.5" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#sakura5" transform="translate(124 232) scale(0.78) rotate(-16)" fill="#f7dde4" fill-opacity="0.9"/>
  <circle cx="124" cy="232" r="6" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#sakura5" transform="translate(208 144) scale(0.7) rotate(40)" fill="#f3c6d0" fill-opacity="0.82"/>
  <circle cx="208" cy="144" r="5.5" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#sakura5" transform="translate(56 230) scale(0.62) rotate(12)" fill="#eeb1c0" fill-opacity="0.8"/>
