  <use href="#sakura5" transform="translate(196 170) scale(0.5)" fill="#f7dde4" fill-opacity="0.78"/>

  <!-- kuncup -->
  <g fill="#d98ba0" opacity="0.85">
    <use href="#bud" transform="translate(228 142) rotate(30)"/>
    <use href="#bud" transform="translate(86 262) rotate(-14) scale(0.8)"/>
    <use href="#bud" transform="translate(178 206) rotate(50) scale(0.7)"/>
