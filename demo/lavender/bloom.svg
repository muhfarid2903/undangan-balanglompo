    <ellipse cx="262" cy="236" rx="5" ry="2.8" transform="rotate(18 262 236)"/>
    <ellipse cx="222" cy="258" rx="5.5" ry="3" transform="rotate(-40 222 258)"/>
  </g>
  <g fill="#c6ad77" opacity="0.8">
    <circle cx="234" cy="170" r="2.4"/><circle cx="190" cy="216" r="2"/>
    <circle cx="146" cy="158" r="2"/><circle cx="250" cy="218" r="1.8"/>
